<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  :root {
    --blue: #1e3a6b;
    --blue-lt: #e8edf8;
    --blue-mid: #2d5aa0;
    --ink: #1a1a14;
    --ink2: #555;
    --ink3: #999;
    --bg: #f8f7f4;
    --bg2: #eeecea;
    --brd: #ddd;
    --r: 6px;
    --r2: 8px;
    --red: #8b1a1a;
    --green: #1a6b3a;
    --amber: #7a5200;
  }
  body {
    font-family:
      system-ui,
      -apple-system,
      sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* Header */
  .hdr {
    background: var(--blue);
    color: #fff;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .hdr-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .hdr-sub {
    font-size: 11px;
    opacity: 0.6;
  }
  .hdr-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .cfg-btn {
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    padding: 6px 14px;
    border-radius: var(--r);
    cursor: pointer;
    font-size: 12px;
  }
  .cfg-btn:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  /* Config panel */
  .cfg {
    display: none;
    background: var(--bg2);
    padding: 14px 18px;
    border-bottom: 1px solid var(--brd);
  }
  .cfg-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .cfg-row input {
    flex: 1;
    padding: 8px;
    border: 1px solid var(--brd);
    border-radius: var(--r);
    font-size: 13px;
  }
  .cfg-row button {
    padding: 8px 16px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: var(--r);
    cursor: pointer;
    font-size: 13px;
  }
  .cfg-status {
    font-size: 12px;
    color: var(--ink3);
  }

  /* Main layout */
  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 16px;
  }

  /* Search bar */
  .search-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .search-wrap input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--brd);
    border-radius: var(--r2);
    font-size: 14px;
    background: #fff;
  }
  .search-wrap input:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(30, 58, 107, 0.08);
  }
  .search-wrap button {
    padding: 10px 18px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: var(--r2);
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .act-btn {
    padding: 10px 18px;
    border: 1px solid var(--brd);
    border-radius: var(--r2);
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .act-btn:hover {
    background: var(--bg2);
  }
  .act-btn.primary {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }
  .act-btn.primary:hover {
    background: var(--blue-mid);
  }
  .act-btn.green {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }

  /* Search results */
  .results {
    margin-bottom: 16px;
  }
  .pt-card {
    background: #fff;
    border: 1px solid var(--brd);
    border-radius: var(--r2);
    padding: 12px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .pt-card:hover {
    border-color: var(--blue);
  }
  .pt-name {
    font-weight: 600;
    font-size: 15px;
  }
  .pt-meta {
    font-size: 12px;
    color: var(--ink2);
    margin-top: 2px;
  }
  .pt-allergy {
    color: var(--red);
    font-weight: 500;
    font-size: 12px;
  }
  .pt-uhid {
    font-size: 11px;
    color: var(--ink3);
    float: right;
    font-family: monospace;
  }

  /* Form sections */
  .form-section {
    background: #fff;
    border: 1px solid var(--brd);
    border-radius: var(--r2);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .fs-hdr {
    padding: 10px 16px;
    background: var(--bg2);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    border-bottom: 1px solid var(--brd);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .fs-hdr .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--blue-lt);
    color: var(--blue);
    font-weight: 500;
  }
  .fs-hdr .badge.req {
    background: #fde8e8;
    color: var(--red);
  }
  .fs-body {
    padding: 14px 16px;
  }
  .fg {
    display: grid;
    gap: 10px;
  }
  .fg2 {
    grid-template-columns: 1fr 1fr;
  }
  .fg3 {
    grid-template-columns: 1fr 1fr 1fr;
  }
  .fg4 {
    grid-template-columns: 1fr 1fr 1fr 1fr;
  }
  .ff {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .ff label {
    font-size: 11px;
    color: var(--ink2);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .ff input,
  .ff select,
  .ff textarea {
    padding: 8px;
    border: 1px solid var(--brd);
    border-radius: var(--r);
    font-size: 13px;
    font-family: inherit;
  }
  .ff input:focus,
  .ff select:focus,
  .ff textarea:focus {
    outline: none;
    border-color: var(--blue);
  }
  .ff textarea {
    resize: vertical;
    min-height: 60px;
  }

  /* Vaccine quick-entry */
  .vax-grid {
    display: grid;
    grid-template-columns: 1fr 80px 110px;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }
  .vax-grid input {
    padding: 6px 8px;
    border: 1px solid var(--brd);
    border-radius: var(--r);
    font-size: 12px;
  }
  .vax-grid select {
    padding: 6px;
    border: 1px solid var(--brd);
    border-radius: var(--r);
    font-size: 12px;
  }
  .vax-hdr {
    font-size: 10px;
    color: var(--ink3);
    text-transform: uppercase;
    font-weight: 600;
  }
  .add-vax-btn {
    padding: 6px 12px;
    background: var(--bg2);
    border: 1px solid var(--brd);
    border-radius: var(--r);
    cursor: pointer;
    font-size: 12px;
    margin-top: 4px;
  }
  .rm-btn {
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
  }

  /* Status bar */
  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--blue);
    color: #fff;
    padding: 10px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    z-index: 50;
  }
  .status-bar button {
    padding: 8px 20px;
    background: #fff;
    color: var(--blue);
    border: none;
    border-radius: var(--r);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .status-bar button:hover {
    background: var(--blue-lt);
  }
  .status-bar button.green-btn {
    background: var(--green);
    color: #fff;
  }
  .status-bar button.green-btn:hover {
    opacity: 0.9;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: #fff;
    padding: 10px 20px;
    border-radius: var(--r2);
    font-size: 14px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
  }

  /* Visit ticket */
  .ticket {
    background: #fff;
    border: 2px solid var(--blue);
    border-radius: var(--r2);
    padding: 20px;
    margin: 16px 0;
    text-align: center;
  }
  .ticket-uhid {
    font-size: 22px;
    font-weight: 700;
    color: var(--blue);
    font-family: monospace;
    letter-spacing: 0.05em;
  }
  .ticket-name {
    font-size: 16px;
    margin-top: 4px;
  }
  .ticket-meta {
    font-size: 12px;
    color: var(--ink2);
    margin-top: 4px;
  }
  .ticket-visit {
    font-size: 13px;
    color: var(--green);
    font-weight: 600;
    margin-top: 10px;
  }

  .empty {
    text-align: center;
    padding: 40px;
    color: var(--ink3);
  }
  .ring {
    width: 28px;
    height: 28px;
    border: 3px solid var(--brd);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 20px auto;
  }
  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }
  @media (max-width: 600px) {
    .fg2,
    .fg3,
    .fg4 {
      grid-template-columns: 1fr;
    }
  }
</style>

<script>
  function esc(s) {
    if (s == null) return "";
    const d = document.createElement("div");
    d.textContent = String(s);
    return d.innerHTML;
  }

  let SB = "https://ecywxuqhnlkjtdshpcbc.supabase.co",
    KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjeXd4dXFobmxranRkc2hwY2JjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MzQ2NTcsImV4cCI6MjA4OTIxMDY1N30.oo-x5L87FzJoprHIK8iFmHRa7AlIZlpDLg5Q1taY1Dg",
    connected = false,
    lastToken = null;
  let currentPatient = null; // null = new patient, object = existing
  let currentVisitId = null; // set after save — enables edit mode
  let searchTimer = null;
  let vaxRows = 0;

  function toggleCfg() {
    const c = document.getElementById("cfg");
    c.style.display = c.style.display === "block" ? "none" : "block";
  }

  async function connectSB() {
    if (!SB)
      SB = document.getElementById("sb-url").value.trim().replace(/\/$/, "");
    if (!KEY) KEY = document.getElementById("sb-key").value.trim();
    if (!SB || !KEY) return;
    try {
      const r = await q("formulary", "?select=count&limit=0");
      if (!r.ok) throw new Error("Connection failed");
      connected = true;
      document.getElementById("conn-status").textContent = "Connected";
      document.getElementById("conn-status").style.color = "#7ec49a";
      document.getElementById("cfg").style.display = "none";
      // Show empty form on connect
      if (!document.getElementById("f-name")) showNewPatientForm();
    } catch (e) {
      alert("Connection failed: " + e.message);
    }
  }

  function q(t, p = "", m = "GET", b = null) {
    const o = {
      method: m,
      headers: {
        apikey: KEY,
        Authorization: "Bearer " + KEY,
        "Content-Type": "application/json",
        Prefer:
          m === "POST"
            ? "return=representation"
            : m === "PATCH"
              ? "return=representation"
              : "",
      },
    };
    if (b) o.body = JSON.stringify(b);
    return fetch(SB + "/rest/v1/" + t + p, o);
  }

  // ===== UHID Generation =====
  async function generateUHID() {
    const now = new Date();
    const month = now.getMonth() + 1;
    const year = now.getFullYear();
    const fyStart = month >= 4 ? year % 100 : (year - 1) % 100;
    const fyEnd = fyStart + 1;
    const mm = String(month).padStart(2, "0");
    const numPart =
      String(fyStart).padStart(2, "0") + String(fyEnd).padStart(2, "0") + mm;
    const prefix = "RKH-" + numPart;
    let nextSeq = 1;
    try {
      const res = await q(
        "patients",
        `?select=id&id=like.${encodeURIComponent(prefix)}*&order=id.desc&limit=1`,
      );
      if (res.ok) {
        const rows = await res.json();
        if (rows.length > 0) {
          const lastSeq = parseInt(rows[0].id.slice(10), 10);
          if (!isNaN(lastSeq)) nextSeq = lastSeq + 1;
        }
      }
    } catch (e) {
      console.warn("UHID lookup failed", e);
    }
    return prefix + String(nextSeq).padStart(5, "0");
  }

  // ===== Search =====
  function debounceSearch(val) {
    clearTimeout(searchTimer);
    if (val.length < 2) {
      document.getElementById("results").innerHTML = "";
      return;
    }
    searchTimer = setTimeout(() => doSearch(val), 300);
  }

  async function doSearch(val) {
    if (!connected) {
      document.getElementById("results").innerHTML =
        '<div class="empty">Connect to Supabase first</div>';
      return;
    }
    document.getElementById("results").innerHTML = '<div class="ring"></div>';
    try {
      const enc = encodeURIComponent(val);
      const r = await q(
        "patients",
        `?is_active=eq.true&or=(name.ilike.*${enc}*,id.ilike.*${enc}*,contact_phone.ilike.*${enc}*,guardian_name.ilike.*${enc}*)&order=name.asc&limit=20`,
      );
      if (!r.ok) throw new Error("Search failed");
      const pts = await r.json();
      if (!pts.length) {
        document.getElementById("results").innerHTML =
          '<div class="empty">No patients found. Click "+ New Patient" to register.</div>';
        return;
      }
      // Store search results in array — pass index to selectPatient (avoids complex JSON-in-HTML-attribute)
      window._searchResults = pts;
      document.getElementById("results").innerHTML = pts
        .map((p, idx) => {
          const allergy =
            p.known_allergies && p.known_allergies.length
              ? '<div class="pt-allergy">ALLERGY: ' +
                p.known_allergies.map((a) => esc(a)).join(", ") +
                "</div>"
              : "";
          const age = p.dob ? esc(calcAge(p.dob)) : "";
          return `<div class="pt-card" onclick="selectPatientByIndex(${idx})">
          <span class="pt-uhid">${esc(p.id)}</span>
          <div class="pt-name">${esc(p.name)}</div>
          <div class="pt-meta">${age}${age ? " · " : ""}${esc(p.sex || "")}${p.guardian_name ? " · " + esc(p.guardian_name) : ""}${p.contact_phone ? " · " + esc(p.contact_phone) : ""}</div>
          ${allergy}
        </div>`;
        })
        .join("");
    } catch (e) {
      document.getElementById("results").innerHTML =
        '<div class="empty">Error: ' + esc(e.message) + "</div>";
    }
  }

  // ===== Select by index from search results (avoids JSON-in-HTML issues) =====
  function selectPatientByIndex(idx) {
    const p = window._searchResults?.[idx];
    if (!p) {
      console.error("selectPatientByIndex: no patient at index", idx);
      return;
    }
    selectPatient(p);
  }

  // ===== Select existing patient for revisit =====
  async function selectPatient(patientObj) {
    try {
      // Accept either an object directly or a JSON string (from QR scan)
      let parsed = patientObj;
      if (typeof patientObj === "string") {
        parsed = JSON.parse(patientObj);
        if (typeof parsed === "string") parsed = JSON.parse(parsed);
      }
      currentPatient = parsed;
      currentVisitId = null;
      document.getElementById("results").innerHTML = "";
      document.getElementById("srch").value = "";
      // Fetch last visit date for header display
      try {
        const lvr = await q(
          "visits",
          `?patient_id=eq.${encodeURIComponent(currentPatient.id)}&order=visit_date.desc&limit=1&select=visit_date,created_at`,
        );
        if (lvr.ok) {
          const lvs = await lvr.json();
          if (lvs.length) currentPatient._lastVisitDate = lvs[0].visit_date;
        }
      } catch (_) {}
      renderForm(currentPatient);
      updateFee();

      // Check if this patient already has a visit today — if so, enable edit mode
      const today = new Date().toISOString().split("T")[0];
      try {
        const tvr = await q(
          "visits",
          `?patient_id=eq.${encodeURIComponent(currentPatient.id)}&visit_date=eq.${today}&order=created_at.desc&limit=1&select=*`,
        );
        if (tvr.ok) {
          const todayVisits = await tvr.json();
          if (todayVisits.length) {
            const visit = todayVisits[0];
            currentVisitId = visit.id;
            // Pre-fill visit fields with saved data
            setTimeout(() => {
              const setVal = (id, v) => {
                const el = document.getElementById(id);
                if (el && v != null) el.value = v;
              };
              setVal("f-visit-date", visit.visit_date);
              setVal("f-doctor", visit.doctor_id);
              setVal("f-wt", visit.weight_kg);
              setVal("f-ht", visit.height_cm);
              setVal("f-hc", visit.hc_cm);
              setVal("f-muac", visit.muac_cm);
              setVal("f-temp", visit.temp_f);
              setVal("f-hr", visit.hr_per_min);
              setVal("f-rr", visit.rr_per_min);
              setVal("f-spo2", visit.spo2_pct);
              setVal("f-bp-sys", visit.bp_systolic);
              setVal("f-bp-dia", visit.bp_diastolic);
              setVal("f-map", visit.map_mmhg);
              calcMAP();
              setVal("f-complaints", visit.chief_complaints);
              setVal("f-ext-notes", visit.clinical_notes);
              setVal("f-fee", visit.consultation_fee);
              setVal("f-pay-mode", visit.payment_mode);
              setVal("f-pay-status", visit.payment_status || "paid");
              // Update save button to indicate edit mode
              const saveBtn = document.getElementById("save-btn");
              if (saveBtn) {
                saveBtn.textContent = "Update Visit";
                saveBtn.style.background = "#2d5aa0";
              }
              showToast(
                "Today's visit found — editing. Change values and click Update Visit.",
              );
            }, 100);
          }
        }
      } catch (e) {
        console.warn("Today visit check:", e.message);
      }

      // Fetch existing vaccinations for returning patient and render checklist
      if (currentPatient.dob) {
        q(
          "vaccinations",
          `?patient_id=eq.${encodeURIComponent(currentPatient.id)}&date_given=not.is.null&select=vaccine_name,dose_number,date_given`,
        )
          .then((r) => (r.ok ? r.json() : []))
          .then((vaxList) => renderVaxChecklist(currentPatient.dob, vaxList))
          .catch(() => renderVaxChecklist(currentPatient.dob, []));
      }
      // Fetch recent lab results for returning patient and show as read-only reference
      q(
        "lab_results",
        `?patient_id=eq.${encodeURIComponent(currentPatient.id)}&order=test_date.desc&limit=10&select=test_name,value,unit,flag,test_date`,
      )
        .then((r) => (r.ok ? r.json() : []))
        .then((labs) => {
          if (!labs.length) return;
          const container = document.getElementById("lab-entries");
          if (!container) return;
          const header = document.createElement("div");
          header.style.cssText =
            "font-size:10px;color:var(--ink3);margin-bottom:4px;font-weight:600;";
          header.textContent = "Previous lab results:";
          container.before(header);
          labs.forEach((l) => {
            const flagIcon =
              l.flag === "low"
                ? "↓"
                : l.flag === "high"
                  ? "↑"
                  : l.flag === "abnormal"
                    ? "⚠"
                    : "✓";
            const flagColor =
              l.flag && l.flag !== "normal" ? "var(--red)" : "var(--green)";
            const d = new Date(l.test_date).toLocaleDateString("en-IN", {
              day: "2-digit",
              month: "short",
            });
            const span = document.createElement("span");
            span.style.cssText =
              "display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:#f0f0ea;border:1px solid var(--brd);border-radius:99px;font-size:10px;color:var(--ink3);margin:2px;";
            span.innerHTML = `<strong>${esc(l.test_name)}</strong>: ${esc(l.value)} ${esc(l.unit || "")} <span style="color:${flagColor}">${flagIcon}</span> (${d})`;
            container.appendChild(span);
          });
        })
        .catch(() => {});
    } catch (outerErr) {
      console.error("selectPatient outer error:", outerErr);
    }
  }

  let existingVax = []; // Populated for returning patients

  // ===== BP: MAP calculation + pediatric percentile =====
  // Pediatric BP 50th/90th/95th percentiles by age (AAP 2017 simplified)
  // Source: AAP Clinical Practice Guideline for Screening and Management of High BP in Children
  // Values: [age_years, sys_50th, sys_90th, sys_95th, dia_50th, dia_90th, dia_95th]
  const BP_CENTILES = [
    [1, 85, 98, 102, 40, 52, 54],
    [2, 87, 100, 104, 42, 54, 56],
    [3, 88, 101, 105, 44, 56, 58],
    [4, 89, 102, 106, 46, 58, 60],
    [5, 90, 103, 107, 48, 60, 62],
    [6, 91, 105, 109, 50, 62, 64],
    [7, 92, 106, 110, 52, 64, 66],
    [8, 93, 107, 111, 54, 66, 68],
    [9, 94, 108, 112, 55, 67, 69],
    [10, 95, 109, 113, 56, 68, 70],
    [11, 96, 110, 114, 57, 69, 71],
    [12, 97, 111, 115, 58, 70, 72],
    [13, 98, 112, 116, 59, 71, 73],
    [14, 100, 114, 118, 60, 72, 74],
    [15, 102, 116, 120, 62, 74, 76],
    [16, 104, 118, 122, 64, 76, 78],
    [17, 106, 120, 124, 66, 78, 80],
    [18, 108, 122, 126, 68, 80, 82],
  ];
  function calcMAP() {
    const sys = parseInt(document.getElementById("f-bp-sys")?.value);
    const dia = parseInt(document.getElementById("f-bp-dia")?.value);
    const mapEl = document.getElementById("f-map");
    const centileEl = document.getElementById("bp-centile");
    if (isNaN(sys) || isNaN(dia)) {
      if (mapEl) mapEl.value = "";
      if (centileEl) centileEl.textContent = "—";
      return;
    }
    const map = Math.round((dia + (sys - dia) / 3) * 10) / 10;
    if (mapEl) mapEl.value = map;
    // Percentile lookup
    if (!centileEl) return;
    const dob = document.getElementById("f-dob")?.value;
    if (!dob) {
      centileEl.textContent = map + " mmHg";
      return;
    }
    const ageYears = Math.floor(
      (new Date() - new Date(dob)) / (365.25 * 86400000),
    );
    if (ageYears < 1) {
      centileEl.innerHTML =
        '<span style="color:var(--ink3)">Age < 1yr (use neonatal norms)</span>';
      return;
    }
    const row =
      BP_CENTILES.find((r) => r[0] === Math.min(ageYears, 18)) ||
      BP_CENTILES[BP_CENTILES.length - 1];
    let label, color;
    if (sys >= row[3] || dia >= row[6]) {
      label = "≥95th (Stage 1 HTN)";
      color = "var(--red)";
    } else if (sys >= row[2] || dia >= row[5]) {
      label = "90th-95th (Elevated)";
      color = "#b8860b";
    } else if (sys >= row[1] || dia >= row[4]) {
      label = "50th-90th (Normal)";
      color = "var(--green)";
    } else {
      label = "<50th (Normal)";
      color = "var(--green)";
    }
    centileEl.innerHTML = `<span style="color:${color};font-weight:600">${label}</span>`;
  }

  // ===== Fee calculation =====
  function updateFee() {
    const visitType = document.getElementById("f-visit-type")?.value;
    const feeEl = document.getElementById("f-fee");
    if (!feeEl) return;
    if (visitType === "emergency") {
      feeEl.value = 500;
      return;
    }
    if (visitType === "vaccination") {
      feeEl.value = 0;
      return;
    }
    if (!currentPatient) {
      feeEl.value = 300;
      return;
    }
    // Check for same-day revisit (free) or within-7-day follow-up (50%)
    const today = new Date().toISOString().split("T")[0];
    q(
      "visits",
      `?patient_id=eq.${encodeURIComponent(currentPatient.id)}&visit_date=lte.${today}&order=visit_date.desc&limit=1&select=visit_date`,
    )
      .then((r) => (r.ok ? r.json() : []))
      .then((visits) => {
        if (!visits.length) {
          feeEl.value = 300;
          return;
        }
        const lastDate = visits[0].visit_date;
        if (lastDate === today) {
          feeEl.value = 0;
          feeEl.style.color = "#1a6b3a";
          return;
        } // Same day = free
        const daysDiff = Math.floor(
          (new Date(today) - new Date(lastDate)) / 86400000,
        );
        if (daysDiff <= 7 && visitType === "followup") {
          feeEl.value = 150;
          return;
        } // 50% within 7 days
        feeEl.value = 300;
        feeEl.style.color = "var(--ink)";
      })
      .catch(() => {
        feeEl.value = 300;
      });
  }

  function renderVaxChecklist(dob, existingVaxList) {
    existingVax = existingVaxList || [];
    const container = document.getElementById("vax-checklist");
    if (!container) return;
    if (!dob) {
      container.innerHTML =
        '<div style="color:var(--ink3);font-size:11px">Enter DOB to show age-based vaccination checklist</div>';
      return;
    }

    const ageMonths = Math.floor(
      (new Date() - new Date(dob)) / (86400000 * 30.44),
    );
    const isGiven = (name, dose) =>
      existingVax.some(
        (v) => v.vaccine_name === name && v.dose_number === dose,
      );

    let h = '<div style="font-size:11px">';
    for (const milestone of activeVaxSchedule === "nhm"
      ? NHM_SCHEDULE
      : IAP_SCHEDULE) {
      if (milestone.mo > ageMonths + 3) break; // Show up to next milestone
      const isPast = milestone.mo <= ageMonths;
      h += `<div style="margin-bottom:6px;padding:4px 0;border-bottom:1px solid #f0f0ea">
        <div style="font-size:10px;font-weight:600;color:${isPast ? "var(--ink2)" : "var(--blue)"};margin-bottom:2px">${milestone.age}${!isPast ? " (upcoming)" : ""}</div>`;
      for (const v of milestone.vax) {
        const given = isGiven(v.n, v.d);
        const key = `vax-${v.n}-${v.d}`.replace(/[^a-zA-Z0-9-]/g, "_");
        const overdue = isPast && !given;
        h += `<label style="display:flex;align-items:center;gap:6px;padding:1px 0;font-size:11px;${overdue ? "color:var(--red)" : ""}">
          <input type="checkbox" id="${key}" data-vax="${esc(v.n)}" data-dose="${v.d}" ${given ? "checked disabled" : ""} style="margin:0" />
          ${esc(v.n)} — Dose ${v.d}
          ${given ? '<span style="color:var(--green);font-size:10px">✓</span>' : ""}
          ${overdue ? '<span style="font-size:9px;color:var(--red)">OVERDUE</span>' : ""}
          ${!given ? '<input type="date" id="' + key + '-date" style="margin-left:auto;padding:1px 4px;border:1px solid var(--brd);border-radius:var(--r);font-size:10px;width:110px" />' : ""}
        </label>`;
      }
      h += "</div>";
    }
    h += "</div>";
    container.innerHTML = h;
  }

  function getCheckedVaccines() {
    const checked = [];
    document
      .querySelectorAll(
        '#vax-checklist input[type="checkbox"]:checked:not(:disabled)',
      )
      .forEach((cb) => {
        const name = cb.dataset.vax;
        const dose = parseInt(cb.dataset.dose);
        const dateEl = document.getElementById(cb.id + "-date");
        const date = dateEl?.value || null;
        if (name)
          checked.push({
            vaccine_name: name,
            dose_number: dose,
            date_given: date,
          });
      });
    return checked;
  }

  // ===== Save & Create Visit =====
  async function saveAndCreateVisit() {
    console.log("saveAndCreateVisit called");

      return;

    const btn = document.getElementById("save-btn");
    if (btn) {
      btn.disabled = true;
      btn.textContent = "Saving…";
    }

    try {
      let patientId;

      if (currentPatient) {
        // Revisit — update patient if any fields changed
        patientId = currentPatient.id;
        const updates = {};
        const fields = {
          name: "f-name",
          dob: "f-dob",
          sex: "f-sex",
          blood_group: "f-bg",
          contact_phone: "f-phone",
          guardian_name: "f-guard",

          gestational_age_weeks: "f-ga",
          birth_weight_kg: "f-bw",
          abha_number: "f-abha",
          abha_address: "f-abha-addr",
        };
        for (const [col, elId] of Object.entries(fields)) {
          const val = (document.getElementById(elId)?.value || "").trim();
          if (val && val !== (currentPatient[col] || "").toString()) {
            updates[col] =
              col === "gestational_age_weeks" || col === "birth_weight_kg"
                ? parseFloat(val) || null
                : val || null;
          }
        }
        // Allergies
        const allergyVal = (
          document.getElementById("f-allergy")?.value || ""
        ).trim();
        const newAllergies = allergyVal
          ? allergyVal
              .split(",")
              .map((s) => s.trim())
              .filter(Boolean)
          : null;
        const oldAllergies = currentPatient.known_allergies;
        if (JSON.stringify(newAllergies) !== JSON.stringify(oldAllergies)) {
          updates.known_allergies = newAllergies;

        if (Object.keys(updates).length > 0) {
          updates.updated_at = new Date().toISOString();
          const ur = await q(
            `patients?id=eq.${encodeURIComponent(patientId)}`,
            "",
            "PATCH",
            updates,

  function toggleExtDictation() {

  async function startExtDictation() {
    const btn = document.getElementById("ext-mic-btn");
    const st = document.getElementById("ext-mic-status");

    // Try AI transcription first
    if (!extAiFailed) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
            sampleRate: 16000,
          },
        });
        extIsRec = true;
        extAudioChunks = [];
        btn.textContent = "⏹ Stop";
        btn.style.background = "#fde8e8";
        st.textContent = "Listening...";

        const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : "audio/webm";
        extMediaRecorder = new MediaRecorder(stream, { mimeType });
        extMediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) extAudioChunks.push(e.data);
        };
        extMediaRecorder.onstop = async () => {
          stream.getTracks().forEach((t) => t.stop());
          if (extAudioChunks.length === 0) return;
          const blob = new Blob(extAudioChunks, { type: mimeType });
          extAudioChunks = [];
          st.textContent = "Transcribing...";
          try {
            const fd = new FormData();
            fd.append("audio", blob, "dictation.webm");
            const res = await fetch(SB + "/functions/v1/transcribe-audio", {
              method: "POST",
              headers: { Authorization: "Bearer " + KEY },
              body: fd,
            });
            if (res.ok) {
              const data = await res.json();
              if (data.text) {
                const ta = document.getElementById("f-ext-notes");
                ta.value = (ta.value + " " + data.text).trim();
              }
            } else {
              const err = await res.json().catch(() => ({}));
              if (err.fallback) extAiFailed = true;
            }
          } catch (e) {
            console.warn("AI transcribe failed:", e.message);
            extAiFailed = true;
          }
          st.textContent = "Dictation stopped";
          btn.textContent = "🎤 Dictate";
          btn.style.background = "";
        };
        extMediaRecorder.start(1000);
        return;
      } catch (err) {
        console.warn(
          "AI dictation unavailable, using Web Speech:",
          err.message,
        );
        extAiFailed = true;
      }
    }

    // Fallback: Web Speech API
    if (
      !("webkitSpeechRecognition" in window || "SpeechRecognition" in window)
    ) {
      alert("Voice dictation requires Chrome or microphone access.");
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    extRecog = new SR();
    extRecog.lang = "en-IN";
    extRecog.continuous = true;
    extRecog.interimResults = true;
    const ta = document.getElementById("f-ext-notes");
    let finalText = ta.value;
    extRecog.onstart = () => {
      extIsRec = true;
      btn.textContent = "⏹ Stop";
      btn.style.background = "#fde8e8";
      st.textContent = "Listening...";
    };
    extRecog.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript + " ";
        else interim = e.results[i][0].transcript;
      }
      ta.value = finalText + interim;
    };
    extRecog.onend = () => {
      extIsRec = false;
      btn.textContent = "🎤 Dictate";
      btn.style.background = "";
      st.textContent = "Dictation stopped";
    };
    extRecog.onerror = () => {
      extIsRec = false;
      btn.textContent = "🎤 Dictate";
      btn.style.background = "";
      st.textContent = "Mic error — try again";
    };
    extRecog.start();
  }

  function addLabEntry() {
    const sel = document.getElementById("f-lab-test");
    const testName = sel.value === "__custom" ? "Custom" : sel.value;
    if (!testName) {
      alert("Select a test first.");
      return;
    }
    const val = document.getElementById("f-lab-val")?.value?.trim();
    if (!val) {
      alert("Enter the result value.");
      return;
    }
    const unit = document.getElementById("f-lab-unit")?.value || "";
    const date =
      document.getElementById("f-lab-date")?.value ||
      new Date().toISOString().split("T")[0];
    const opt = sel.selectedOptions[0];
    const ref = opt?.dataset?.ref || "";

    // Auto-compute flag
    let flag = "normal";
    const num = parseFloat(val);
    if (ref && !isNaN(num)) {
      const parts = ref.split("-").map((s) => parseFloat(s.trim()));
      if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
        if (num < parts[0]) flag = "low";
        else if (num > parts[1]) flag = "high";
      }
    }
    if (
      ref &&
      (ref.toLowerCase().includes("negative") ||
        ref.toLowerCase().includes("no growth"))
    ) {
      if (
        val.toLowerCase().includes("positive") ||
        val.toLowerCase().includes("growth")
      )
        flag = "abnormal";
    }

    const entry = {
      test_name: testName,
      value: val,
      unit,
      ref,
      flag,
      test_date: date,
      cat: sel.selectedOptions[0]?.parentElement?.label || "",
      loinc: opt?.dataset?.loinc || null,
    };
    labEntries.push(entry);
    renderLabEntries();

    // Clear inputs
    sel.value = "";
    document.getElementById("f-lab-val").value = "";
    document.getElementById("f-lab-unit").value = "";
    document.getElementById("f-lab-unit").setAttribute("readonly", "");
  }

  async function uploadDocuments(patientId, visitId) {
    const uploaded = [];
    for (let i = 0; i < docUploadCount; i++) {
      const row = document.getElementById("doc-row-" + i);
      if (!row) continue;
      const fileInput = document.getElementById("doc-file-" + i);
      const file = fileInput?.files?.[0];
      if (!file) continue;
      const cat = document.getElementById("doc-cat-" + i)?.value || "other";
      const date = document.getElementById("doc-date-" + i)?.value || "";
      const desc = document.getElementById("doc-desc-" + i)?.value || "";
      if (file.size > 10 * 1024 * 1024) {
        console.warn("File too large:", file.name);
        continue;
      }
      try {
        const ext = file.name.split(".").pop() || "jpg";
        const path = `${patientId}/${visitId}/${cat}_${Date.now()}.${ext}`;
        const uploadRes = await fetch(
          SB + "/storage/v1/object/documents/" + path,
          {
            method: "POST",
            headers: {
              apikey: KEY,
              Authorization: "Bearer " + KEY,
              "Content-Type": file.type,
              "x-upsert": "true",
            },
            body: file,
          },
        );
        if (uploadRes.ok) {
          const url = SB + "/storage/v1/object/public/documents/" + path;
          uploaded.push({
            category: cat,
            date,
            description: desc,
            filename: file.name,
            url,
            size_bytes: file.size,
          });
          console.log("Uploaded:", cat, file.name, "→", url);
        } else {
          console.warn("Upload failed:", file.name, uploadRes.status);
        }
      } catch (e) {
        console.warn("Upload error:", file.name, e.message);
      }
    }
    return uploaded;
  }

  function resetAll() {
    document.getElementById("form-area").innerHTML = "";
    document.getElementById("ticket-area").innerHTML = "";
    document.getElementById("status-bar").style.display = "none";
    document.getElementById("srch").value = "";
    document.getElementById("results").innerHTML = "";
    currentPatient = null;
    currentVisitId = null;

  async function editVisit() {
    if (!currentVisitId) {
      alert("No visit to edit.");
      return;
    }
    // Fetch the current visit data
    try {
      const vr = await q("visits", `?id=eq.${currentVisitId}&select=*`);
      if (!vr.ok) throw new Error("Could not load visit");
      const visits = await vr.json();
      if (!visits.length) throw new Error("Visit not found");
      const visit = visits[0];
      // Fetch the patient
      const pr = await q(
        "patients",
        `?id=eq.${encodeURIComponent(visit.patient_id)}&select=*`,
      );
      if (!pr.ok) throw new Error("Could not load patient");
      const patients = await pr.json();
      if (!patients.length) throw new Error("Patient not found");
      currentPatient = patients[0];
      // Clear ticket, show form
      document.getElementById("ticket-area").innerHTML = "";
      document.getElementById("status-bar").style.display = "flex";
      renderForm(currentPatient);
      // Pre-fill visit fields
      setTimeout(() => {
        const setVal = (id, v) => {
          const el = document.getElementById(id);
          if (el && v != null) el.value = v;
        };
        setVal("f-visit-date", visit.visit_date);
        setVal("f-doctor", visit.doctor_id);
        setVal("f-wt", visit.weight_kg);
        setVal("f-ht", visit.height_cm);
        setVal("f-hc", visit.hc_cm);
        setVal("f-muac", visit.muac_cm);
        setVal("f-temp", visit.temp_f);
        setVal("f-hr", visit.hr_per_min);
        setVal("f-rr", visit.rr_per_min);
        setVal("f-spo2", visit.spo2_pct);
        setVal("f-complaints", visit.chief_complaints);
        setVal("f-ext-notes", visit.clinical_notes);
        // Update save button to indicate edit mode
        const saveBtn = document.getElementById("save-btn");
        if (saveBtn) {
          saveBtn.textContent = "Update Visit";
          saveBtn.style.background = "#2d5aa0";
        }
      }, 100);
      showToast("Editing visit — make changes and click Update Visit");
    } catch (e) {
      alert("Error loading visit: " + e.message);
    }
  }

  function calcAge(dob) {
    if (!dob) return "";
    const d = new Date(dob),
      now = new Date();
    const days = Math.floor((now - d) / 86400000);
    if (days < 0) return "";
    if (days < 28) return days + " days";
    let y = now.getFullYear() - d.getFullYear(),
      m = now.getMonth() - d.getMonth(),
      dd = now.getDate() - d.getDate();
    if (dd < 0) m--;
    if (m < 0) {
      y--;
      m += 12;
    }
    if (y === 0) return m + " months";
    if (y < 2) return y + " yr " + m + " mo";
    return y + " years";
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  // ===== QR Scanner =====
  let qrScanner = null;

  function startQrScan() {
    if (!window.Html5Qrcode) {
      alert("QR scanner library not loaded. Check internet connection.");
      return;
    }
    document.getElementById("qr-scanner-area").style.display = "block";
    document.getElementById("qr-status").textContent = "Starting camera…";
    qrScanner = new Html5Qrcode("qr-reader");
    qrScanner
      .start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
          // QR scanned successfully
          stopQrScan();
          handleQrResult(decodedText);
        },
        () => {}, // ignore scan failures (no QR in frame yet)
      )
      .catch((err) => {
        document.getElementById("qr-status").textContent =
          "Camera error: " + err;
      });
  }

  function stopQrScan() {
    if (qrScanner) {
      qrScanner.stop().catch(() => {});
      qrScanner.clear();
      qrScanner = null;
    }
    document.getElementById("qr-scanner-area").style.display = "none";
  }

  async function handleQrResult(text) {
    try {
      const data = JSON.parse(text);
      if (data.uhid) {
        // Search for patient by UHID
        showToast("QR scanned — looking up " + data.uhid);
        document.getElementById("srch").value = data.uhid;
        if (connected) {
          const r = await q(
            "patients",
            `?id=eq.${encodeURIComponent(data.uhid)}&is_active=eq.true`,
          );
          if (r.ok) {
            const pts = await r.json();
            if (pts.length) {
              selectPatient(JSON.stringify(pts[0]));
              showToast(
                "Patient found: " + pts[0].name + " — creating revisit",
              );
              return;
            }
          }
        }
        // Patient not found in DB — pre-fill new registration from QR data
        showNewPatientForm();
        if (data.pt) document.getElementById("f-name").value = data.pt;
        if (data.dob) document.getElementById("f-dob").value = data.dob;
        if (data.sex) {
          const sexMap = { M: "Male", F: "Female", O: "Other" };
          document.getElementById("f-sex").value = sexMap[data.sex] || "";
        }
        document.getElementById("f-uhid").value =
          data.uhid + " (from QR — will verify)";
        showToast(
          "Patient not in database — pre-filled from QR for new registration",
        );
      } else {
        showToast("QR code does not contain patient data");
      }
    } catch (e) {
      // Not JSON — try as plain UHID string
      if (text.startsWith("RKH-")) {
        document.getElementById("srch").value = text;
        doSearch(text);
        showToast("QR scanned — searching for " + text);
      } else {
        showToast("Unrecognised QR code format");
      }
    }
  }

  // ===== ABDM ABHA Verification =====
  async function verifyAbha() {
    const abhaNum = (document.getElementById("f-abha")?.value || "").trim();
    if (!abhaNum) {
      toast("Enter ABHA number first", "warn");
      return;
    }
    const statusEl = document.getElementById("abha-status-ff");
    statusEl.innerHTML =
      '<span style="color:var(--blue);font-size:11px">Verifying...</span>';
    try {
      // TODO: Call abdm-identity Edge Function when deployed
      // For now, mark as verified locally if format looks valid (14 digits with hyphens)
      const cleaned = abhaNum.replace(/[^0-9]/g, "");
      if (cleaned.length !== 14) {
        statusEl.innerHTML =
          '<span style="color:#e74c3c;font-size:11px">Invalid ABHA format (need 14 digits)</span>';
        return;
      }
      // Placeholder: will call ABDM sandbox API via Edge Function
      statusEl.innerHTML =
        '<span style="color:#f39c12;font-size:11px">ABHA recorded (verification pending ABDM sandbox)</span>';
      toast(
        "ABHA number recorded. Full verification requires ABDM sandbox integration.",
        "info",
      );
    } catch (e) {
      statusEl.innerHTML =
        '<span style="color:#e74c3c;font-size:11px">Verification failed</span>';
      toast("ABHA verification error: " + e.message, "err");
    }
  }

  // Auto-connect on page load
  if (
    document.readyState === "complete" ||
    document.readyState === "interactive"
  ) {
    connectSB();
  } else {
    document.addEventListener("DOMContentLoaded", () => connectSB());
  }
  setTimeout(() => {
    if (!connected) connectSB();
  }, 2000);
</script>
