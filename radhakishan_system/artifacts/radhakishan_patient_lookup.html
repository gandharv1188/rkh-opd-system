<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  :root {
    --blue: #1e3a6b;
    --blue-lt: #e8edf8;
    --blue-mid: #2d5aa0;
    --green: #1a5c35;
    --green-lt: #e8f4ed;
    --red: #8b1a1a;
    --red-lt: #fdf0f0;
    --amber: #7a4a00;
    --amber-lt: #fef8e8;
    --ink: #1a1a14;
    --ink2: #3d3d30;
    --ink3: #7a7a60;
    --bg: #f8f7f1;
    --bg2: #fff;
    --bg3: #eeeadb;
    --bdr: rgba(26, 26, 20, 0.1);
    --bdr2: rgba(26, 26, 20, 0.18);
    --r: 6px;
    --r2: 10px;
  }
  body {
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 13px;
  }
  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 0 60px;
  }

  .hdr {
    background: var(--blue);
    color: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .hdr h1 {
    font-size: 15px;
    font-weight: 600;
  }
  .hdr p {
    font-size: 11px;
    opacity: 0.65;
    margin-top: 2px;
  }
  .conn-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cdot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #f87171;
  }
  .cdot.ok {
    background: #4ade80;
  }
  .cst {
    font-size: 11px;
    opacity: 0.8;
  }
  .hbtn {
    padding: 5px 12px;
    background: rgba(255, 255, 255, 0.15);
    border: 0.5px solid rgba(255, 255, 255, 0.3);
    border-radius: 99px;
    color: #fff;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }

  .cfg {
    background: var(--blue-lt);
    border-bottom: 1px solid rgba(30, 58, 107, 0.15);
    padding: 12px 20px;
    display: none;
  }
  .cfg-g {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .fl label {
    display: block;
    font-size: 10px;
    color: var(--ink3);
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .fl input {
    width: 100%;
    padding: 7px 9px;
    border: 0.5px solid var(--bdr2);
    border-radius: var(--r);
    background: #fff;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    font-family: inherit;
  }
  .fl input:focus {
    border-color: var(--blue);
  }

  .search-area {
    padding: 14px 20px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--bdr2);
  }
  .search-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
  }
  .srch-big {
    flex: 1;
    position: relative;
  }
  .srch-big input {
    width: 100%;
    padding: 10px 12px 10px 36px;
    border: 0.5px solid var(--bdr2);
    border-radius: var(--r2);
    background: var(--bg);
    font-size: 14px;
    color: var(--ink);
    outline: none;
    font-family: inherit;
  }
  .srch-big input:focus {
    border-color: var(--blue);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(30, 58, 107, 0.08);
  }
  .srch-ic {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink3);
    font-size: 16px;
    pointer-events: none;
  }
  .new-btn {
    padding: 10px 18px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--r2);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .new-btn:hover {
    background: #1e6b3e;
  }
  .search-hint {
    font-size: 11px;
    color: var(--ink3);
  }

  .results {
    padding: 0 20px;
  }

  .result-card {
    background: var(--bg2);
    border: 0.5px solid var(--bdr2);
    border-radius: var(--r2);
    margin-top: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.12s;
  }
  .result-card:hover {
    border-color: var(--blue);
  }
  .result-card.active {
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(30, 58, 107, 0.1);
  }
  .rc-hdr {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .rc-main {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
  }
  .rc-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--blue-lt);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--blue);
    flex-shrink: 0;
  }
  .rc-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
  }
  .rc-meta {
    font-size: 11px;
    color: var(--ink3);
    margin-top: 2px;
  }
  .rc-uhid {
    font-size: 11px;
    font-weight: 600;
    color: var(--blue);
    background: var(--blue-lt);
    padding: 2px 8px;
    border-radius: 99px;
    flex-shrink: 0;
  }
  .rc-chev {
    color: var(--ink3);
    font-size: 16px;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .rc-chev.open {
    transform: rotate(180deg);
  }

  .pt-detail {
    display: none;
    border-top: 0.5px solid var(--bdr);
    padding: 14px;
  }
  .pt-detail.open {
    display: block;
  }

  .pt-tabs {
    display: flex;
    border-bottom: 0.5px solid var(--bdr2);
    margin-bottom: 12px;
  }
  .ptt {
    padding: 7px 14px;
    background: none;
    border: none;
    font-size: 12px;
    color: var(--ink3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    font-family: inherit;
  }
  .ptt.on {
    color: var(--blue);
    border-bottom-color: var(--blue);
  }

  .visit-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r);
    border: 0.5px solid var(--bdr);
    margin-bottom: 6px;
    cursor: default;
    background: var(--bg);
  }
  .visit-date {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    min-width: 90px;
  }
  .visit-dx {
    font-size: 12px;
    color: var(--ink2);
    flex: 1;
  }
  .visit-wt {
    font-size: 11px;
    color: var(--ink3);
    min-width: 50px;
    text-align: right;
  }
  .v-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    background: var(--bg3);
    color: var(--ink3);
    flex-shrink: 0;
  }

  .rx-row {
    padding: 10px 12px;
    border-radius: var(--r);
    border: 0.5px solid var(--bdr);
    margin-bottom: 6px;
    background: var(--bg);
  }
  .rx-row-hdr {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    flex-wrap: wrap;
  }
  .rx-id {
    font-size: 11px;
    font-weight: 700;
    color: var(--blue);
    font-family: "Courier New", monospace;
  }
  .rx-date {
    font-size: 11px;
    color: var(--ink3);
  }
  .rx-approved {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    background: var(--green-lt);
    color: var(--green);
    border: 0.5px solid rgba(26, 92, 53, 0.2);
  }
  .rx-meds {
    font-size: 12px;
    color: var(--ink2);
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .rx-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .rxa {
    padding: 5px 12px;
    border-radius: 99px;
    border: 0.5px solid var(--bdr2);
    background: none;
    font-size: 11px;
    color: var(--ink2);
    cursor: pointer;
    font-family: inherit;
  }
  .rxa:hover {
    background: var(--bg3);
  }
  .rxa.primary {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }
  .rxa.primary:hover {
    background: var(--blue-mid);
  }

  .growth-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 0.5px solid var(--bdr);
    font-size: 12px;
    flex-wrap: wrap;
  }
  .growth-row:last-child {
    border-bottom: none;
  }
  .growth-date {
    color: var(--ink3);
    min-width: 90px;
    font-size: 11px;
  }
  .z-chip {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    border: 0.5px solid currentColor;
  }
  .z-ok {
    color: var(--green);
    background: var(--green-lt);
  }
  .z-warn {
    color: var(--amber);
    background: var(--amber-lt);
  }
  .z-bad {
    color: var(--red);
    background: var(--red-lt);
  }

  .new-pt-wrap {
    padding: 0 20px;
  }
  .new-pt-form {
    background: var(--bg2);
    border: 0.5px solid var(--bdr2);
    border-radius: var(--r2);
    padding: 16px;
    margin-top: 12px;
    display: none;
  }
  .np-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    margin-bottom: 12px;
  }
  .fg {
    display: grid;
    gap: 8px;
    margin-bottom: 8px;
  }
  .fg.g2 {
    grid-template-columns: 1fr 1fr;
  }
  .fg.g3 {
    grid-template-columns: 1fr 1fr 1fr;
  }
  .fg.g4 {
    grid-template-columns: 1fr 1fr 1fr 1fr;
  }
  .ff label {
    display: block;
    font-size: 10px;
    color: var(--ink3);
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .ff input,
  .ff select {
    width: 100%;
    padding: 7px 9px;
    border: 0.5px solid var(--bdr2);
    border-radius: var(--r);
    background: var(--bg);
    font-size: 12px;
    color: var(--ink);
    outline: none;
    font-family: inherit;
  }
  .ff input:focus,
  .ff select:focus {
    border-color: var(--blue);
    background: #fff;
  }
  .form-btns {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .sv-btn {
    padding: 8px 20px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--r);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .cn-btn {
    padding: 8px 14px;
    background: none;
    border: 0.5px solid var(--bdr2);
    border-radius: var(--r);
    font-size: 13px;
    color: var(--ink2);
    cursor: pointer;
    font-family: inherit;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink3);
  }
  .empty-state h3 {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink2);
    margin-bottom: 6px;
  }
  .empty-state p {
    font-size: 13px;
    line-height: 1.6;
  }
  .ring {
    width: 18px;
    height: 18px;
    border: 2px solid var(--bdr2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 30px auto 10px;
  }
  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }
  .eb {
    background: var(--red-lt);
    border: 0.5px solid rgba(139, 26, 26, 0.2);
    border-radius: var(--r);
    padding: 8px 12px;
    font-size: 12px;
    color: var(--red);
    margin: 8px 0 0;
  }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: #fff;
    padding: 9px 20px;
    border-radius: 99px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.on {
    opacity: 1;
  }
  .no-data {
    text-align: center;
    padding: 24px;
    color: var(--ink3);
    font-size: 12px;
    font-style: italic;
  }
</style>

<div class="app">
  <div class="hdr">
    <div>
      <h1>Patient Lookup</h1>
      <p>Search patients · View history · Load previous prescription</p>
    </div>
    <div class="conn-row">
      <div class="cdot" id="cdot"></div>
      <span class="cst" id="cst">Not connected</span>
      <button class="hbtn" onclick="toggleCfg()">Configure</button>
    </div>
  </div>

  <div class="cfg" id="cfg">
    <div class="cfg-g">
      <div class="fl">
        <label>Supabase URL</label
        ><input id="sb-url" placeholder="https://xxxx.supabase.co" />
      </div>
      <div class="fl">
        <label>Anon Key</label
        ><input id="sb-key" type="password" placeholder="eyJhbGc…" />
      </div>
    </div>
    <div style="display: flex; gap: 8px">
      <button
        style="
          padding: 8px 16px;
          background: var(--blue);
          color: #fff;
          border: none;
          border-radius: var(--r);
          font-size: 13px;
          cursor: pointer;
          font-family: inherit;
        "
        onclick="connectDB()"
      >
        Connect
      </button>
      <button
        style="
          padding: 8px 14px;
          background: none;
          border: 0.5px solid var(--bdr2);
          border-radius: var(--r);
          font-size: 12px;
          cursor: pointer;
          font-family: inherit;
        "
        onclick="toggleCfg()"
      >
        Cancel
      </button>
    </div>
  </div>

  <div class="search-area">
    <div class="search-row">
      <div class="srch-big">
        <span class="srch-ic">⌕</span>
        <input
          id="srch"
          placeholder="Search by patient name, UHID, or phone number…"
          oninput="searchPatients(this.value)"
        />
      </div>
      <button class="new-btn" onclick="toggleNewForm()">+ New patient</button>
    </div>
    <div class="search-hint" id="srch-hint">
      Type at least 2 characters · or enter UHID directly
    </div>
  </div>

  <div class="new-pt-wrap">
    <div class="new-pt-form" id="new-pt-form">
      <div class="np-title">Register new patient</div>
      <div class="fg g3" style="margin-bottom: 8px">
        <div class="ff">
          <label>Full name *</label
          ><input id="np-name" placeholder="Patient full name" />
        </div>
        <div class="ff">
          <label>Date of birth</label><input type="date" id="np-dob" />
        </div>
        <div class="ff">
          <label>Sex</label
          ><select id="np-sex">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
      </div>
      <div class="fg g2" style="margin-bottom: 8px">
        <div class="ff">
          <label>Guardian name</label
          ><input id="np-guard" placeholder="e.g. Rajesh Kumar" />
        </div>
        <div class="ff">
          <label>Relation</label><input id="np-rel" placeholder="e.g. Father" />
        </div>
      </div>
      <div class="fg g4" style="margin-bottom: 8px">
        <div class="ff">
          <label>Contact phone</label
          ><input id="np-phone" placeholder="e.g. 9876543210" />
        </div>
        <div class="ff">
          <label>Gestational age (wks)</label
          ><input type="number" id="np-ga" placeholder="Leave blank if term" />
        </div>
        <div class="ff">
          <label>Birth weight (kg)</label
          ><input type="number" id="np-bw" step="0.01" placeholder="e.g. 1.1" />
        </div>
        <div class="ff">
          <label>Blood group</label><input id="np-bg" placeholder="e.g. B+" />
        </div>
        <div class="ff" style="grid-column: 1 / -1">
          <label>Known allergies (comma-separated)</label
          ><input
            id="np-allergy"
            placeholder="e.g. Penicillin, Sulfa drugs — leave blank if NKDA"
          />
        </div>
      </div>
      <div class="form-btns">
        <button class="sv-btn" onclick="registerPatient()">
          Register patient
        </button>
        <button class="cn-btn" onclick="toggleNewForm()">Cancel</button>
      </div>
      <div id="np-err" class="eb" style="display: none"></div>
    </div>
  </div>

  <div class="results" id="results">
    <div class="empty-state">
      <h3>Find a patient</h3>
      <p>
        Search by name, UHID, or phone.<br />Or register a new patient above.
      </p>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  function esc(s) {
    if (s == null) return "";
    const d = document.createElement("div");
    d.textContent = String(s);
    return d.innerHTML;
  }

  let SB = "",
    KEY = "",
    openCardId = null,
    openCardTab = {};

  function toggleCfg() {
    const c = document.getElementById("cfg");
    c.style.display = c.style.display === "block" ? "none" : "block";
  }

  async function connectDB() {
    SB = document.getElementById("sb-url").value.trim().replace(/\/$/, "");
    KEY = document.getElementById("sb-key").value.trim();
    if (!SB || !KEY) {
      alert("Enter URL and key.");
      return;
    }
    try {
      const r = await q("patients", "?select=id&limit=1");
      if (r.ok) {
        setConn(true);
        toggleCfg();
      } else throw new Error((await r.json()).message);
    } catch (e) {
      setConn(false);
      alert("Failed: " + e.message);
    }
  }
  function setConn(ok) {
    document.getElementById("cdot").className = "cdot" + (ok ? " ok" : "");
    document.getElementById("cst").textContent = ok ? "Connected" : "Failed";
  }
  function q(t, p = "", m = "GET", b = null) {
    const o = {
      method: m,
      headers: {
        apikey: KEY,
        Authorization: "Bearer " + KEY,
        "Content-Type": "application/json",
        Prefer: m === "POST" ? "return=representation" : "",
      },
    };
    if (b) o.body = JSON.stringify(b);
    return fetch(SB + "/rest/v1/" + t + p, o);
  }

  let searchTimer = null;
  function searchPatients(val) {
    clearTimeout(searchTimer);
    const hint = document.getElementById("srch-hint");
    if (!val || val.length < 2) {
      hint.textContent = "Type at least 2 characters · or enter UHID directly";
      return;
    }
    hint.textContent = "Searching…";
    searchTimer = setTimeout(() => doSearch(val), 350);
  }

  async function doSearch(val) {
    if (!KEY) {
      document.getElementById("results").innerHTML =
        '<div class="empty-state"><h3>Not connected</h3><p>Configure Supabase first.</p></div>';
      return;
    }
    document.getElementById("results").innerHTML =
      '<div class="ring"></div><div style="text-align:center;color:var(--ink3);font-size:12px;padding-bottom:20px">Searching…</div>';
    try {
      const enc = encodeURIComponent(val);
      const r = await q(
        "patients",
        `?is_active=eq.true&or=(name.ilike.*${enc}*,id.ilike.*${enc}*,contact_phone.ilike.*${enc}*)&order=name.asc&limit=20`,
      );
      if (!r.ok) throw new Error((await r.json()).message);
      const pts = await r.json();
      document.getElementById("srch-hint").textContent =
        `${pts.length} patient${pts.length !== 1 ? "s" : ""} found`;
      renderResults(pts);
    } catch (e) {
      document.getElementById("results").innerHTML =
        `<div class="empty-state"><h3>Search error</h3><p>${esc(e.message)}</p></div>`;
    }
  }

  function renderResults(pts) {
    const wrap = document.getElementById("results");
    if (!pts.length) {
      wrap.innerHTML =
        '<div class="empty-state"><h3>No patients found</h3><p>Try a different name or UHID,<br>or register a new patient.</p></div>';
      return;
    }
    wrap.innerHTML = pts
      .map((p) => {
        const initials = esc(
          (p.name || "?")
            .split(" ")
            .map((w) => w[0])
            .join("")
            .slice(0, 2)
            .toUpperCase(),
        );
        const age = p.dob
          ? esc(calcAge(p.dob, p.gestational_age_weeks))
          : "Age unknown";
        const guardian = p.guardian_name
          ? `${esc(p.guardian_name)}${p.guardian_relation ? " (" + esc(p.guardian_relation) + ")" : ""}`
          : null;
        const safeId = esc(p.id);
        return `<div class="result-card" id="card-${safeId}" onclick="toggleCard('${safeId}')">
      <div class="rc-hdr">
        <div class="rc-main">
          <div class="rc-avatar">${initials}</div>
          <div>
            <div class="rc-name">${esc(p.name)}</div>
            <div class="rc-meta">${age} · ${esc(p.sex) || "—"}${guardian ? " · " + guardian : ""}${p.known_allergies && p.known_allergies.length ? ' · <span style="color:#8b1a1a;font-weight:500">ALLERGY: ' + p.known_allergies.map((a) => esc(a)).join(", ") + "</span>" : ""}</div>
          </div>
        </div>
        <span class="rc-uhid">${safeId}</span>
        <span class="rc-chev" id="chev-${safeId}">▾</span>
      </div>
      <div class="pt-detail" id="detail-${safeId}"></div>
    </div>`;
      })
      .join("");
  }

  async function toggleCard(pid) {
    const detail = document.getElementById("detail-" + pid);
    const chev = document.getElementById("chev-" + pid);
    const card = document.getElementById("card-" + pid);
    if (detail.classList.contains("open")) {
      detail.classList.remove("open");
      chev.classList.remove("open");
      card.classList.remove("active");
      openCardId = null;
      return;
    }
    document.querySelectorAll(".pt-detail.open").forEach((el) => {
      el.classList.remove("open");
      const id = el.id.replace("detail-", "");
      const ch = document.getElementById("chev-" + id);
      if (ch) ch.classList.remove("open");
      const ca = document.getElementById("card-" + id);
      if (ca) ca.classList.remove("active");
    });
    detail.classList.add("open");
    chev.classList.add("open");
    card.classList.add("active");
    openCardId = pid;
    if (!openCardTab[pid]) openCardTab[pid] = 0;
    await loadDetail(pid, detail);
  }

  async function loadDetail(pid, container) {
    container.innerHTML = '<div class="ring" style="margin:16px auto"></div>';
    try {
      const [vRes, rxRes, grRes] = await Promise.all([
        q("visits", `?patient_id=eq.${pid}&order=visit_date.desc&limit=50`),
        q(
          "prescriptions",
          `?patient_id=eq.${pid}&order=created_at.desc&limit=50`,
        ),
        q(
          "growth_records",
          `?patient_id=eq.${pid}&order=recorded_date.desc&limit=50`,
        ),
      ]);
      const visits = vRes.ok ? await vRes.json() : [];
      const rxs = rxRes.ok ? await rxRes.json() : [];
      const growths = grRes.ok ? await grRes.json() : [];
      renderDetail(pid, container, visits, rxs, growths);
    } catch (e) {
      container.innerHTML = `<div class="eb" style="margin:12px">${esc(e.message)}</div>`;
    }
  }

  function renderDetail(pid, container, visits, rxs, growths) {
    const tab = openCardTab[pid] || 0;
    const safePid = esc(pid);
    const vLabel = visits.length >= 50 ? "50+" : visits.length;
    const rxLabel = rxs.length >= 50 ? "50+" : rxs.length;
    const grLabel = growths.length >= 50 ? "50+" : growths.length;
    let h = `<div class="pt-tabs">
    <button class="ptt ${tab === 0 ? "on" : ""}" onclick="event.stopPropagation();switchTab('${safePid}',0)">Visits (${vLabel})</button>
    <button class="ptt ${tab === 1 ? "on" : ""}" onclick="event.stopPropagation();switchTab('${safePid}',1)">Prescriptions (${rxLabel})</button>
    <button class="ptt ${tab === 2 ? "on" : ""}" onclick="event.stopPropagation();switchTab('${safePid}',2)">Growth (${grLabel})</button>
  </div>`;

    if (tab === 0) {
      if (!visits.length) {
        h += '<div class="no-data">No visits recorded yet</div>';
      } else {
        h += visits
          .map((v) => {
            const dxNames =
              (v.diagnosis_codes || [])
                .map((d) => esc(d.name || d.icd10))
                .join(", ") || "No diagnosis recorded";
            return `<div class="visit-row">
          <div class="visit-date">${formatDate(v.visit_date)}</div>
          <div class="visit-dx">${dxNames}</div>
          <div class="visit-wt">${v.weight_kg ? esc(v.weight_kg) + " kg" : ""}</div>
          <span class="v-badge">Visit</span>
        </div>`;
          })
          .join("");
      }
      h += `<div style="margin-top:10px">
      <button onclick="event.stopPropagation();startNewVisit('${safePid}')"
        style="padding:8px 16px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:12px;cursor:pointer;font-family:inherit">
        + Start new prescription for this patient
      </button>
    </div>`;
    }

    if (tab === 1) {
      if (!rxs.length) {
        h += '<div class="no-data">No prescriptions yet</div>';
      } else {
        h += rxs
          .map((rx) => {
            const meds = (rx.medicines || rx.generated_json?.medicines || [])
              .slice(0, 3)
              .map((m) => esc((m.row1_en || "").split("(")[0].trim()))
              .filter(Boolean)
              .join(" · ");
            const safeRxId = esc(rx.id);
            return `<div class="rx-row" onclick="event.stopPropagation()">
          <div class="rx-row-hdr">
            <span class="rx-id">${safeRxId}</span>
            <span class="rx-date">${formatDate(rx.created_at?.split("T")[0])}</span>
            ${rx.is_approved ? '<span class="rx-approved">Approved</span>' : ""}
          </div>
          <div class="rx-meds">${meds || "No medicines recorded"}</div>
          <div class="rx-actions">
            ${rx.pdf_url ? `<button class="rxa" onclick="window.open('${esc(rx.pdf_url)}')">View file</button>` : ""}
            <button class="rxa" onclick="showRxDetail('${safeRxId}')">View details</button>
            <button class="rxa primary" onclick="reusePrescription('${safeRxId}')">Reuse as template</button>
          </div>
        </div>`;
          })
          .join("");
      }
    }

    if (tab === 2) {
      if (!growths.length) {
        h += '<div class="no-data">No growth records yet</div>';
      } else {
        h += `<div style="font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px">Growth history — latest first</div>`;
        h += growths
          .map((g) => {
            const zc = (v) => {
              const n = parseFloat(v);
              if (isNaN(n)) return "";
              return n <= -3 || n >= 3
                ? "z-bad"
                : n <= -2 || n >= 2
                  ? "z-warn"
                  : "z-ok";
            };
            const zfields = [
              { l: "WAZ", v: g.waz },
              { l: "HAZ", v: g.haz },
              { l: "WHZ", v: g.whz },
              { l: "HCZ", v: g.hcaz },
            ].filter((f) => f.v !== null && f.v !== undefined);
            return `<div class="growth-row">
          <span class="growth-date">${formatDate(g.recorded_date)}</span>
          <span style="font-size:12px;font-weight:500;color:var(--ink)">${g.weight_kg ? esc(g.weight_kg) + "kg" : ""} ${g.height_cm ? esc(g.height_cm) + "cm" : ""}</span>
          ${zfields.map((f) => `<span class="z-chip ${zc(f.v)}">${esc(f.l)}: ${esc(f.v)}</span>`).join("")}
          ${g.muac_cm ? `<span class="z-chip ${parseFloat(g.muac_cm) < 11.5 ? "z-bad" : parseFloat(g.muac_cm) < 12.5 ? "z-warn" : "z-ok"}">MUAC: ${esc(g.muac_cm)}cm</span>` : ""}
          <span style="font-size:11px;color:var(--ink3)">${esc(g.classification) || ""}</span>
        </div>`;
          })
          .join("");
      }
    }

    container.innerHTML = h;
  }

  async function switchTab(pid, tab) {
    openCardTab[pid] = tab;
    const container = document.getElementById("detail-" + pid);
    await loadDetail(pid, container);
  }

  function startNewVisit(pid) {
    showToast("Loading patient into prescription pad…");
    window.parent.postMessage(
      {
        type: "radhakishan-load-patient",
        payload: { patient_id: pid, mode: "new_visit" },
      },
      "https://claude.ai",
    );
    setTimeout(() => {
      alert(
        `Patient ${pid} selected.\n\nIn the connected system this pre-fills the Prescription Pad with the patient's demographics and recent visit context.`,
      );
    }, 300);
  }

  async function reusePrescription(rxId) {
    if (!KEY) return;
    try {
      const r = await q("prescriptions", `?id=eq.${rxId}&select=*`);
      if (!r.ok) throw new Error("Could not load prescription");
      const rxs = await r.json();
      if (!rxs.length) throw new Error("Not found");
      const rx = rxs[0];
      const data = rx.generated_json || {};
      window.parent.postMessage(
        {
          type: "radhakishan-rx-template",
          payload: { rxData: data, patient_id: rx.patient_id },
        },
        "https://claude.ai",
      );
      showToast("Prescription loaded as template in pad");
    } catch (e) {
      alert("Error: " + e.message);
    }
  }

  async function showRxDetail(rxId) {
    if (!KEY) return;
    try {
      const r = await q(
        "prescriptions",
        `?id=eq.${rxId}&select=id,created_at,medicines,generated_json`,
      );
      const rxs = await r.json();
      if (!rxs.length) return;
      const rx = rxs[0];
      const meds = rx.medicines || rx.generated_json?.medicines || [];
      let msg = `Prescription: ${rx.id}\nDate: ${formatDate(rx.created_at?.split("T")[0])}\n\nMedicines:\n`;
      meds.forEach((m, i) => {
        msg += `${i + 1}. ${m.row1_en || ""}\n   ${m.row2_en || ""}\n`;
      });
      const dx = (rx.generated_json?.diagnosis || [])
        .map((d) => d.name)
        .join(", ");
      if (dx) msg = `Diagnosis: ${dx}\n\n` + msg;
      alert(msg);
    } catch (e) {
      alert("Error: " + e.message);
    }
  }

  function toggleNewForm() {
    const f = document.getElementById("new-pt-form");
    f.style.display = f.style.display === "block" ? "none" : "block";
    if (f.style.display === "block") document.getElementById("np-name").focus();
  }

  async function registerPatient() {
    const name = document.getElementById("np-name").value.trim();
    if (!name) {
      document.getElementById("np-err").textContent =
        "Patient name is required.";
      document.getElementById("np-err").style.display = "block";
      return;
    }
    if (!KEY) {
      alert("Connect to Supabase first.");
      return;
    }
    const id = await generateUHID();
    const payload = {
      id,
      name,
      dob: document.getElementById("np-dob").value || null,
      sex: document.getElementById("np-sex").value,
      guardian_name: document.getElementById("np-guard").value || null,
      guardian_relation: document.getElementById("np-rel").value || null,
      contact_phone: document.getElementById("np-phone").value || null,
      gestational_age_weeks:
        parseFloat(document.getElementById("np-ga").value) || null,
      birth_weight_kg:
        parseFloat(document.getElementById("np-bw").value) || null,
      blood_group: document.getElementById("np-bg").value || null,
      known_allergies: document.getElementById("np-allergy").value.trim()
        ? document
            .getElementById("np-allergy")
            .value.split(",")
            .map((s) => s.trim())
            .filter(Boolean)
        : null,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString(),
    };
    try {
      const r = await q("patients", "", "POST", payload);
      if (!r.ok) {
        const e = await r.json();
        throw new Error(e.message || "Registration failed");
      }
      document.getElementById("new-pt-form").style.display = "none";
      document.getElementById("np-err").style.display = "none";
      // Clear form
      [
        "np-name",
        "np-dob",
        "np-guard",
        "np-rel",
        "np-phone",
        "np-ga",
        "np-bw",
        "np-bg",
        "np-allergy",
      ].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });
      showToast(`Patient registered — UHID: ${id}`);
      document.getElementById("srch").value = name;
      doSearch(name);
    } catch (e) {
      document.getElementById("np-err").textContent = "Error: " + e.message;
      document.getElementById("np-err").style.display = "block";
    }
  }

  async function generateUHID() {
    // Format: RKH-YYMM##### where YY=FY start, YY=FY end, MM=month, #####=sequential
    // Indian financial year: April (current year) to March (next year)
    const now = new Date();
    const month = now.getMonth() + 1; // 1-12
    const year = now.getFullYear();
    const fyStart = month >= 4 ? year % 100 : (year - 1) % 100;
    const fyEnd = fyStart + 1;
    const mm = String(month).padStart(2, "0");
    const numPart =
      String(fyStart).padStart(2, "0") + String(fyEnd).padStart(2, "0") + mm;
    const prefix = "RKH-" + numPart;

    // Query Supabase for the max existing ID with this prefix
    let nextSeq = 1;
    try {
      const res = await q(
        "patients",
        `?select=id&id=like.${encodeURIComponent(prefix)}*&order=id.desc&limit=1`,
      );
      if (res.ok) {
        const rows = await res.json();
        if (rows.length > 0) {
          const lastSeq = parseInt(rows[0].id.slice(10), 10); // "RKH-" (4) + YYMM (6) = 10
          if (!isNaN(lastSeq)) nextSeq = lastSeq + 1;
        }
      }
    } catch (e) {
      console.warn("UHID sequence lookup failed, using 00001", e);
    }
    return prefix + String(nextSeq).padStart(5, "0");
  }

  function calcAge(dob, gaWeeks) {
    if (!dob) return "";
    const d = new Date(dob),
      now = new Date();
    const days = Math.floor((now - d) / 86400000);
    if (days < 0) return "";
    if (days < 28) return days + " days";
    let y = now.getFullYear() - d.getFullYear(),
      m = now.getMonth() - d.getMonth(),
      dd = now.getDate() - d.getDate();
    if (dd < 0) {
      m--;
    }
    if (m < 0) {
      y--;
      m += 12;
    }
    let age;
    if (y === 0) age = m + " months";
    else if (y < 2) age = y + " yr " + m + " mo";
    else age = y + " years";
    // Corrected age for preterms (GA < 37 weeks, until 2 years chronological)
    if (gaWeeks && gaWeeks < 37 && y < 2) {
      const corrWeeks = 40 - gaWeeks;
      const corrDays = days - corrWeeks * 7;
      if (corrDays > 0) {
        const corrMonths = Math.floor(corrDays / 30.44);
        const corrYears = Math.floor(corrMonths / 12);
        const corrMo = corrMonths % 12;
        let corrAge;
        if (corrDays < 28) corrAge = corrDays + " days";
        else if (corrYears === 0) corrAge = corrMo + " months";
        else corrAge = corrYears + " yr " + corrMo + " mo";
        age += " (corrected: " + corrAge + ")";
      }
    }
    return age;
  }

  function formatDate(d) {
    if (!d) return "—";
    try {
      return new Date(d).toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric",
      });
    } catch (e) {
      return d;
    }
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("on");
    setTimeout(() => t.classList.remove("on"), 2500);
  }

  // Listen for patient data from pad (if used in reverse)
  window.addEventListener("message", (e) => {
    if (e.data && e.data.type === "radhakishan-search-patient") {
      const val = e.data.payload?.query || "";
      if (val) {
        document.getElementById("srch").value = val;
        doSearch(val);
      }
    }
  });
</script>
