name: DIS CI

on:
  pull_request:
    paths:
      - "dis/**"
      - ".github/workflows/dis-ci.yml"
  push:
    branches:
      - "feat/dis-*"

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dis
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-save
          fi

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  port-validator:
    name: Port Validator (DIP enforcement)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run port validator
        run: |
          output=$(node dis/scripts/port-validator.mjs)
          if [ -n "$output" ]; then
            echo "Port validator found violations:"
            echo "$output"
            exit 1
          fi
          echo "Port validator: no violations."

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        if: env.GITLEAKS_LICENSE != ''
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  openapi-lint:
    name: OpenAPI Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        if: hashFiles('dis/openapi.yaml') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint OpenAPI spec
        if: hashFiles('dis/openapi.yaml') != ''
        run: npx --yes @redocly/cli@latest lint dis/openapi.yaml

  migration-roundtrip:
    name: Migration Round-trip (placeholder)
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Placeholder
        run: echo "TODO DIS-145"
