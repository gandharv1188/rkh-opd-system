name: DIS CI

on:
  pull_request:
    paths:
      - "dis/**"
      - ".github/workflows/dis-ci.yml"
      - "radhakishan_system/docs/feature_plans/document_ingestion_service/07_tickets/**"
  push:
    branches:
      - "feat/dis-*"

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dis
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-save
          fi

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  port-validator:
    name: Port Validator (DIP enforcement)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run port validator
        run: node dis/scripts/port-validator.mjs

  citations:
    name: PR Citations (Control 1)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify PR citations resolve
        run: node dis/scripts/check-pr-citations.mjs

  files-touched:
    name: Files-Touched Allowlist (Control 2)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify diff against files_allowed
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          git fetch origin feat/dis-plan || true
          node dis/scripts/check-files-touched.mjs \
            --base "$(git merge-base HEAD origin/feat/dis-plan 2>/dev/null || echo HEAD~1)"

  fitness:
    name: Architectural Fitness (Control 3)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run fitness functions
        run: node dis/scripts/fitness.mjs

  forbidden-tokens:
    name: Forbidden Tokens (Control 7)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scan for forbidden tokens
        run: node dis/scripts/check-forbidden-tokens.mjs

  drift-controls-selftest:
    name: Drift-controls self-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run self-test harness
        run: node dis/scripts/__tests__/drift-controls.test.mjs

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        if: env.GITLEAKS_LICENSE != ''
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  openapi-lint:
    name: OpenAPI Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        if: hashFiles('dis/openapi.yaml') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint OpenAPI spec
        if: hashFiles('dis/openapi.yaml') != ''
        run: npx --yes @redocly/cli@latest lint dis/openapi.yaml

  migration-roundtrip:
    name: Migration Round-trip (placeholder)
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Placeholder
        run: echo "TODO DIS-145"
